name: Build and Release mrpack

on:
  push:
    branches: [main]
    paths:
      - 'mods-config.yaml'
      - 'scripts/build-mrpack.sh'
      - 'scripts/check-deps.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Check mod dependencies
        run: python3 scripts/check-deps.py

      - name: Build mrpack
        run: bash scripts/build-mrpack.sh

      - name: Delete existing 'latest' release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing 'latest' tag
        run: git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JLN-HUT Modpack (Latest)"
          body: |
            Minecraft MODパック for jln-hut.page サーバー。

            ## インストール方法

            1. `jln-hut-modpack.mrpack` をダウンロード
            2. [Modrinth App](https://modrinth.com/app) を起動
            3. 「+」→「From file」→ .mrpack を選択してインポート
          files: |
            jln-hut-modpack.mrpack
          make_latest: true
